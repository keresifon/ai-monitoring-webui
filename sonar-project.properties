sonar.organization=keresifon
sonar.projectKey=keresifon_ai-monitoring-webui
sonar.projectName=WebUI

sonar.sources=src
sonar.exclusions=**/*.spec.ts,**/*.test.ts,**/node_modules/**,**/dist/**

sonar.tests=src
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts,**/main.ts,**/app.config.ts,**/app.routes.ts,**/environments/**

sonar.sourceEncoding=UTF-8

# Exclude false positives and design decisions
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e6,e7,e8,e9,e10,e11,e12
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S2068
sonar.issue.ignore.multicriteria.e1.resourceKey=**/login.component.ts
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S2068
sonar.issue.ignore.multicriteria.e2.resourceKey=**/register.component.ts
sonar.issue.ignore.multicriteria.e3.ruleKey=html:S5993
sonar.issue.ignore.multicriteria.e3.resourceKey=**/login.component.html
sonar.issue.ignore.multicriteria.e4.ruleKey=html:S5993
sonar.issue.ignore.multicriteria.e4.resourceKey=**/register.component.html
# Text contrast issues - design decisions
sonar.issue.ignore.multicriteria.e6.ruleKey=css:S5361
sonar.issue.ignore.multicriteria.e6.resourceKey=**/alert-list.component.scss
sonar.issue.ignore.multicriteria.e7.ruleKey=css:S5361
sonar.issue.ignore.multicriteria.e7.resourceKey=**/login.component.scss
sonar.issue.ignore.multicriteria.e8.ruleKey=css:S5361
sonar.issue.ignore.multicriteria.e8.resourceKey=**/log-viewer.component.scss
sonar.issue.ignore.multicriteria.e9.ruleKey=css:S5361
sonar.issue.ignore.multicriteria.e9.resourceKey=**/navbar.component.scss
sonar.issue.ignore.multicriteria.e10.ruleKey=css:S5361
sonar.issue.ignore.multicriteria.e10.resourceKey=**/sidebar.component.scss
# FormBuilder.group() deprecation - framework limitation, usage is correct
sonar.issue.ignore.multicriteria.e11.ruleKey=typescript:S6571
sonar.issue.ignore.multicriteria.e11.resourceKey=**/register.component.ts
# Top-level await - Not supported in target browsers, promise chain required
sonar.issue.ignore.multicriteria.e12.ruleKey=typescript:S7785
sonar.issue.ignore.multicriteria.e12.resourceKey=**/main.ts
