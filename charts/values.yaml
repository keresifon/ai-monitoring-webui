replicaCount: 1

image:
  repository: ghcr.io/kere-sifon/ai-monitoring-webui
  pullPolicy: IfNotPresent
  tag: "1.0.9"

# For private GHCR images: create a docker-registry secret and set:
# imagePullSecrets: [{ name: ghcr-pull-secret }]
# Or make the package public in GitHub Package settings.
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: "ai-monitoring-webui"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: ai-monitoring.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: frontend-tls
      hosts:
        - ai-monitoring.example.com

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 50m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5

openshift:
  enabled: false
  route:
    enabled: true
    host: ""
    annotations:
      haproxy.router.openshift.io/timeout: 60s
    tls:
      enabled: true
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
      destinationCACertificate: ""
