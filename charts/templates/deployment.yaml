apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "frontend.fullname" . }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "frontend.selectorLabels" . | nindent 8 }}
        app: {{ include "frontend.name" . }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "frontend.serviceAccountName" . }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsNonRoot: true
        {{- if .Values.openshift.enabled }}
        # OpenShift assigns UID from the namespace SCC range; restricted-v2/v3 forbid fsGroup 0 and fixed UID 101.
        # Dockerfile uses chgrp 0 + chmod g=u so nginx runs with arbitrary UID + root group.
        hostUsers: false
        {{- else }}
        runAsUser: 101        # nginx UID in nginx:alpine image
        runAsGroup: 0         # group 0 — matches chgrp -R 0 in Dockerfile
        fsGroup: 0
        {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # nginx writes to /tmp/nginx/* and /var/run/nginx.pid
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}