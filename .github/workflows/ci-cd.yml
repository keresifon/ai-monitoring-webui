name: CI/CD

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, develop]
  issue_comment:
    types: [created]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  detect-deployment-target:
    runs-on: ubuntu-latest
    if: github.event_name == 'issue_comment' && github.event.issue.pull_request && startsWith(github.event.comment.body, '/deploy')
    permissions:
      contents: read
      pull-requests: write
      issues: write
    outputs:
      target: ${{ steps.parse.outputs.target }}
      pr_ref: ${{ steps.pr.outputs.ref }}
      pr_sha: ${{ steps.pr.outputs.sha }}
    steps:
      - name: Check if commenter has write access
        uses: actions/github-script@v7
        with:
          script: |
            const { data: permission } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.comment.user.login
            });
            if (!['admin', 'write'].includes(permission.permission)) {
              core.setFailed('Only users with write access can trigger deployments');
            }

      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            const sha = pr.data.merged ? pr.data.merge_commit_sha : pr.data.head.sha;
            const ref = pr.data.merged ? pr.data.base.ref : pr.data.head.ref;
            core.setOutput('ref', ref);
            core.setOutput('sha', sha);

      - name: Parse deployment target
        id: parse
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          if echo "$COMMENT_BODY" | grep -qiE '^/deploy\s+(aks|openshift|oc)\s*$'; then
            TARGET=$(echo "$COMMENT_BODY" | grep -oiE '(aks|openshift|oc)' | head -1 | tr '[:upper:]' '[:lower:]')
            if [ "$TARGET" = "oc" ]; then
              TARGET="openshift"
            fi
            echo "target=$TARGET" >> $GITHUB_OUTPUT
          else
            echo "Invalid deployment command. Use: /deploy aks or /deploy openshift"
            exit 1
          fi

      - name: Add reaction to comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

  # Runs on develop push and PRs targeting develop only (NOT on main, tags, or PRs to main)
  build-and-test:
    runs-on: ubuntu-latest
    if: "github.event_name != 'issue_comment' && !startsWith(github.ref, 'refs/tags/') && github.ref != 'refs/heads/main' && (github.event_name != 'pull_request' || github.base_ref == 'develop')"
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for SonarCloud

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=critical
        continue-on-error: true

      # OWASP Dependency-Check: official image + pinned tag (not Dependency-Check_Action@main).
      # 12.x+: NVD CVSS v4 JSON (e.g. SAFETY) breaks older clients. ODC data in /tmp inside container (avoids H2 lock on overlay).
      # Scan package.json + package-lock.json only (full repo scan often hits exit 12 during report generation).
      # CVSS >= 7 fails the job. Set NVD_API_KEY repo secret. Fork PRs do not receive secrets by default.
      # -XX:ActiveProcessorCount=1: NVD API path uses a DB writer pool sized by availableProcessors(); parallel
      #   H2 updates on cpeEntry can deadlock (e.g. CVE-2012-6496 / 40001). Single writer avoids that.
      - name: OWASP Dependency-Check (CVE scan)
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$PWD/reports"
          chmod 777 "$PWD/reports"   # ODC container user needs write access


          docker run --rm \
            -e JAVA_OPTS="-Xmx8192m -XX:ActiveProcessorCount=1" \
            -e "NVD_API_KEY=${NVD_API_KEY}" \
            -v "$PWD/package.json:/src/package.json:ro" \
            -v "$PWD/package-lock.json:/src/package-lock.json:ro" \
            -v "$PWD/dependency-check-suppression.xml:/src/dependency-check-suppression.xml:ro" \
            -v "$PWD/reports:/report:rw" \
            owasp/dependency-check:12.2.0 \
            --data /tmp/odc-data \
            --nvdApiKey "${NVD_API_KEY}" \
            --scan /src/package.json \
            --scan /src/package-lock.json \
            --format JSON \
            --out /report \
            --project "ai-monitoring-webui" \
            --failOnCVSS 7 \
            --enableRetired \
            --suppression /src/dependency-check-suppression.xml \
            --log /report/dependency-check.log

      - name: Upload Dependency-Check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/
          retention-days: 30
        continue-on-error: true

      - name: Lint
        run: npm run lint
        continue-on-error: true  # Continue if linting is not configured

      - name: Build
        run: npm run build -- --configuration=production

      - name: Test with coverage
        run: npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage
        continue-on-error: false

      - name: Verify coverage file exists
        id: coverage-check
        run: |
          echo "Searching for coverage file..."
          echo "Checking coverage directory structure:"
          ls -la coverage/ 2>/dev/null || echo "Coverage directory does not exist"
          
          if [ -d "coverage/ai-monitoring-ui" ]; then
            echo "Contents of coverage/ai-monitoring-ui:"
            ls -la coverage/ai-monitoring-ui/ 2>/dev/null || echo "Directory is empty"
            echo "Searching for .info files:"
            find coverage/ai-monitoring-ui -name "*.info" -type f 2>/dev/null || echo "No .info files found"
          fi
          
          # Check for coverage file in common locations
          COVERAGE_FILE=""
          if [ -f "coverage/lcov.info" ]; then
            COVERAGE_FILE="coverage/lcov.info"
            echo "Found at: coverage/lcov.info"
          elif [ -f "coverage/ai-monitoring-ui/lcov.info" ]; then
            COVERAGE_FILE="coverage/ai-monitoring-ui/lcov.info"
            echo "Found at: coverage/ai-monitoring-ui/lcov.info"
          else
            # Try to find it recursively
            echo "Searching recursively for lcov.info..."
            COVERAGE_FILE=$(find . -path "*/node_modules" -prune -o -name "lcov.info" -type f -print 2>/dev/null | head -n 1)
            if [ -n "$COVERAGE_FILE" ]; then
              echo "Found at: $COVERAGE_FILE"
            fi
          fi
          
          if [ -n "$COVERAGE_FILE" ] && [ -f "$COVERAGE_FILE" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "coverage_file=$COVERAGE_FILE" >> $GITHUB_OUTPUT
            echo "✓ Coverage file found at $COVERAGE_FILE"
            echo "File size:"
            ls -lh "$COVERAGE_FILE"
            echo "First 20 lines of coverage file:"
            head -n 20 "$COVERAGE_FILE" || echo "File is empty or unreadable"
            echo "Coverage summary (first 10 entries):"
            grep -E "^SF:|^LF:|^LH:" "$COVERAGE_FILE" | head -n 10 || echo "No coverage data found"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✗ Coverage file not found"
            echo "All .info files in coverage directory:"
            find coverage -type f -name "*.info" 2>/dev/null || echo "No .info files found"
            echo "All files in coverage directory:"
            find coverage -type f 2>/dev/null | head -n 20 || echo "No files found"
          fi

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Prepare SonarCloud args
        id: sonar-args
        run: |
          if [ "${{ steps.coverage-check.outputs.exists }}" == "true" ]; then
            COVERAGE_FILE="${{ steps.coverage-check.outputs.coverage_file }}"
            echo "args=-Dsonar.javascript.lcov.reportPaths=$COVERAGE_FILE -Dsonar.typescript.lcov.reportPaths=$COVERAGE_FILE -Dsonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts,**/main.ts,**/app.config.ts,**/app.routes.ts,**/environments/**" >> $GITHUB_OUTPUT
          else
            echo "args=-Dsonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts,**/main.ts,**/app.config.ts,**/app.routes.ts,**/environments/**" >> $GITHUB_OUTPUT
          fi

      - name: Run SonarCloud analysis
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: ${{ steps.sonar-args.outputs.args }}

      - name: Upload coverage to Codecov
        if: steps.coverage-check.outputs.exists == 'true'
        uses: codecov/codecov-action@v4
        with:
          files: ${{ steps.coverage-check.outputs.coverage_file }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unittests
          name: codecov-umbrella
          verbose: true

  # CodeQL SAST - runs in parallel with build-and-test
  sast-codeql:
    runs-on: ubuntu-latest
    if: "github.event_name != 'issue_comment' && !startsWith(github.ref, 'refs/tags/') && github.ref != 'refs/heads/main' && (github.event_name != 'pull_request' || github.base_ref == 'develop')"
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        id: codeql-analysis
        uses: github/codeql-action/analyze@v4

      - name: Upload CodeQL SARIF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif-results
          path: ${{ steps.codeql-analysis.outputs.sarif-output }}
          retention-days: 30

  # Builds Docker image on develop (with sha) or version tags (with semver)
  docker-build:
    needs: [build-and-test]
    if: always() && (github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push' && github.event_name != 'issue_comment' && (needs.build-and-test.result == 'success' || needs.build-and-test.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --configuration=production

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # For develop: develop, sha-xxxxx
            type=ref,event=branch
            type=sha
            # For tags: v1.0.0 -> 1.0.0, 1.0, 1, latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract tag for values.yaml update
        id: extract-tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          # Extract version from tag (v1.2.3 -> 1.2.3)
          TAG_NAME="${{ github.ref_name }}"
          VERSION="${TAG_NAME#v}"  # Remove 'v' prefix if present
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted tag: $VERSION from $TAG_NAME"

      - name: Trigger values.yaml update
        if: startsWith(github.ref, 'refs/tags/v') && steps.extract-tag.outputs.tag != ''
        env:
          # Try PAT first, fallback to GITHUB_TOKEN
          GITHUB_TOKEN: ${{ secrets.REPO_DISPATCH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          # Use GitHub API to trigger repository_dispatch
          # Note: If this fails, create a Personal Access Token (PAT) with 'repo' scope
          # and add it as a secret named 'REPO_DISPATCH_TOKEN'
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token $GITHUB_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{
              "event_type": "image-pushed",
              "client_payload": {
                "tag": "${{ steps.extract-tag.outputs.tag }}",
                "image": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}",
                "ref": "${{ github.ref }}"
              }
            }')
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          if [ "$HTTP_CODE" = "204" ]; then
            echo "✓ Repository dispatch triggered successfully for tag: ${{ steps.extract-tag.outputs.tag }}"
          else
            echo "⚠ Repository dispatch failed with HTTP $HTTP_CODE"
            echo "Response: $BODY"
            echo "Note: The update-image-tag workflow will still trigger via workflow_run after CI/CD completes"
          fi

  # Trivy container image scanning (Phase 1)
  image-scan:
    needs: [docker-build]
    if: always() && (github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push' && github.event_name != 'issue_comment' && needs.docker-build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag for scan
        id: scan-tag
        run: |
          REF="${{ github.ref_name }}"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${REF#v}" >> $GITHUB_OUTPUT
          else
            echo "tag=develop" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.scan-tag.outputs.tag }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          # trivy-action@0.35+ uses this input (not `args`) — sets TRIVY_IGNOREFILE for the scan
          trivyignores: '.trivyignore'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-container'

  # Deploys to AKS on main branch push (uses values.yaml tag)
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28.0'

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Create namespace if not exists
        run: |
          kubectl create namespace ai-monitoring --dry-run=client -o yaml | kubectl apply -f -

      - name: Clear stuck Helm release (if any)
        run: |
          if helm list -n ai-monitoring 2>/dev/null | grep -q ai-monitoring-webui; then
            echo "Clearing any pending Helm operation..."
            helm rollback ai-monitoring-webui -n ai-monitoring 2>/dev/null || true
            sleep 5
          fi

      - name: Deploy with Helm
        run: |
          helm upgrade --install ai-monitoring-webui ./charts \
            --namespace ai-monitoring \
            --create-namespace \
            -f charts/values.yaml

      - name: Verify deployment
        run: |
          echo "Checking deployment status..."
          kubectl rollout status deployment/ai-monitoring-webui-frontend -n ai-monitoring --timeout=5m
          echo ""
          echo "Pods:"
          kubectl get pods -n ai-monitoring -l app.kubernetes.io/name=frontend -o wide
          echo ""
          echo "Services:"
          kubectl get svc -n ai-monitoring -l app.kubernetes.io/name=frontend

      - name: Debug (on failure)
        if: failure()
        run: |
          echo "=== All pods in namespace ==="
          kubectl get pods -n ai-monitoring -o wide
          echo ""
          echo "=== Deployment status ==="
          kubectl describe deployment ai-monitoring-webui-frontend -n ai-monitoring 2>/dev/null || true
          echo ""
          echo "=== Recent events ==="
          kubectl get events -n ai-monitoring --sort-by='.lastTimestamp' --field-selector type!=Normal 2>/dev/null | tail -30
          echo ""
          echo "=== Pod details (by label) ==="
          kubectl describe pods -n ai-monitoring -l app.kubernetes.io/name=frontend 2>/dev/null || true
          echo ""
          echo "=== Pod logs ==="
          for pod in $(kubectl get pods -n ai-monitoring -l app.kubernetes.io/name=frontend -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl logs -n ai-monitoring $pod --tail=50 --all-containers=true 2>/dev/null || true
          done

  deploy-openshift:
    needs: [detect-deployment-target]
    runs-on: oc-run
    if: needs.detect-deployment-target.outputs.target == 'openshift'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code at PR SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect-deployment-target.outputs.pr_sha }}

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # TLS: use org/repo secret OPENSHIFT_CA_BUNDLE (PEM) + --certificate-authority, or omit it to use --insecure-skip-tls-verify (e.g. CRC / internal CAs not in runner trust store)
      - name: Login to OpenShift
        env:
          OPENSHIFT_TOKEN: ${{ secrets.OPENSHIFT_TOKEN }}
          OPENSHIFT_SERVER: ${{ secrets.OPENSHIFT_SERVER }}
          OPENSHIFT_PROJECT: ${{ secrets.OPENSHIFT_PROJECT }}
          OPENSHIFT_CA_BUNDLE: ${{ secrets.OPENSHIFT_CA_BUNDLE }}
        run: |
          if [ -n "$OPENSHIFT_CA_BUNDLE" ]; then
            printf '%s\n' "$OPENSHIFT_CA_BUNDLE" > /tmp/openshift-ca.crt
            oc login --token="$OPENSHIFT_TOKEN" --server="$OPENSHIFT_SERVER" --certificate-authority=/tmp/openshift-ca.crt
          else
            oc login --token="$OPENSHIFT_TOKEN" --server="$OPENSHIFT_SERVER" --insecure-skip-tls-verify
          fi
          oc project "$OPENSHIFT_PROJECT"

      - name: Clear stuck Helm release (if any)
        run: |
          NS="${{ secrets.OPENSHIFT_PROJECT }}"
          if helm list -n "$NS" 2>/dev/null | grep -q ai-monitoring-webui; then
            STATUS=$(helm status ai-monitoring-webui -n "$NS" 2>/dev/null | awk '/^STATUS:/{print $2}')
            echo "Helm release status: ${STATUS:-unknown}"
            case "$STATUS" in
              pending-install|pending-upgrade|pending-rollback)
                echo "Rolling back to clear stuck operation..."
                helm rollback ai-monitoring-webui -n "$NS" --wait --timeout 5m
                ;;
            esac
          fi

      - name: Deploy with Helm
        run: |
          helm upgrade --install ai-monitoring-webui ./charts \
            --namespace ${{ secrets.OPENSHIFT_PROJECT }} \
            -f charts/values.yaml \
            --set openshift.enabled=true \
            --wait \
            --timeout 5m

      - name: Verify deployment
        run: |
          echo "Checking deployment status..."
          oc rollout status deployment/ai-monitoring-webui-frontend -n ${{ secrets.OPENSHIFT_PROJECT }} --timeout=3m
          echo ""
          echo "Pods:"
          oc get pods -n ${{ secrets.OPENSHIFT_PROJECT }} -l app.kubernetes.io/name=frontend -o wide
          echo ""
          echo "Services:"
          oc get svc -n ${{ secrets.OPENSHIFT_PROJECT }} -l app.kubernetes.io/name=frontend
          echo ""
          echo "Routes:"
          oc get route -n ${{ secrets.OPENSHIFT_PROJECT }} -l app.kubernetes.io/name=frontend

      - name: Get Route URL
        id: route
        run: |
          ROUTE_URL=$(oc get route ai-monitoring-webui-frontend -n ${{ secrets.OPENSHIFT_PROJECT }} -o jsonpath='{.spec.host}')
          echo "url=https://$ROUTE_URL" >> $GITHUB_OUTPUT

      - name: Comment on PR with deployment info
        uses: actions/github-script@v7
        with:
          script: |
            const routeUrl = '${{ steps.route.outputs.url }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ Successfully deployed to OpenShift!\n\n**Route URL:** ${routeUrl}\n**Namespace:** ${{ secrets.OPENSHIFT_PROJECT }}\n**Commit:** ${{ needs.detect-deployment-target.outputs.pr_sha }}`
            });

      - name: Debug pod (on failure)
        if: failure()
        run: |
          oc get pods -n ${{ secrets.OPENSHIFT_PROJECT }} -l app.kubernetes.io/name=frontend -o wide || true
          oc describe pods -n ${{ secrets.OPENSHIFT_PROJECT }} -l app.kubernetes.io/name=frontend || true
          oc logs -n ${{ secrets.OPENSHIFT_PROJECT }} -l app.kubernetes.io/name=frontend --tail=100 --all-containers=true 2>/dev/null || true

      - name: Comment on PR with failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ OpenShift deployment failed. Check the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`
            });

  deploy-aks-pr:
    needs: [detect-deployment-target]
    runs-on: ubuntu-latest
    if: needs.detect-deployment-target.outputs.target == 'aks'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code at PR SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect-deployment-target.outputs.pr_sha }}

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28.0'

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Create namespace if not exists
        run: |
          kubectl create namespace ai-monitoring --dry-run=client -o yaml | kubectl apply -f -

      - name: Clear stuck Helm release (if any)
        run: |
          if helm list -n ai-monitoring 2>/dev/null | grep -q ai-monitoring-webui; then
            helm rollback ai-monitoring-webui -n ai-monitoring 2>/dev/null || true
            sleep 5
          fi

      - name: Deploy with Helm
        run: |
          helm upgrade --install ai-monitoring-webui ./charts \
            --namespace ai-monitoring \
            --create-namespace \
            -f charts/values.yaml \
            --wait \
            --timeout 5m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/ai-monitoring-webui-frontend -n ai-monitoring --timeout=5m
          kubectl get pods -n ai-monitoring -l app.kubernetes.io/name=frontend -o wide
          kubectl get svc -n ai-monitoring -l app.kubernetes.io/name=frontend

      - name: Comment on PR with deployment info
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ Successfully deployed to AKS!\n\n**Namespace:** ai-monitoring\n**Commit:** ${{ needs.detect-deployment-target.outputs.pr_sha }}`
            });

      - name: Debug (on failure)
        if: failure()
        run: |
          kubectl get pods -n ai-monitoring -l app.kubernetes.io/name=frontend -o wide || true
          kubectl describe pods -n ai-monitoring -l app.kubernetes.io/name=frontend || true
          kubectl logs -n ai-monitoring -l app.kubernetes.io/name=frontend --tail=100 --all-containers=true 2>/dev/null || true

      - name: Comment on PR with failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ AKS deployment failed. Check the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`
            });

  helm-lint:
    runs-on: ubuntu-latest
    if: github.event_name != 'issue_comment'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Lint Helm chart
        run: helm lint charts/
