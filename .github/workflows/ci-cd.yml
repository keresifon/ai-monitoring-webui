name: CI/CD

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Runs on develop and PRs only (NOT on main or tags)
  build-and-test:
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/tags/') && github.ref != 'refs/heads/main'"
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for SonarCloud

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true  # Continue if linting is not configured

      - name: Build
        run: npm run build -- --configuration=production

      - name: Test with coverage
        run: npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage
        continue-on-error: false

      - name: Verify coverage file exists
        id: coverage-check
        run: |
          echo "Searching for coverage file..."
          echo "Checking coverage directory structure:"
          ls -la coverage/ 2>/dev/null || echo "Coverage directory does not exist"
          
          if [ -d "coverage/ai-monitoring-ui" ]; then
            echo "Contents of coverage/ai-monitoring-ui:"
            ls -la coverage/ai-monitoring-ui/ 2>/dev/null || echo "Directory is empty"
            echo "Searching for .info files:"
            find coverage/ai-monitoring-ui -name "*.info" -type f 2>/dev/null || echo "No .info files found"
          fi
          
          # Check for coverage file in common locations
          COVERAGE_FILE=""
          if [ -f "coverage/lcov.info" ]; then
            COVERAGE_FILE="coverage/lcov.info"
            echo "Found at: coverage/lcov.info"
          elif [ -f "coverage/ai-monitoring-ui/lcov.info" ]; then
            COVERAGE_FILE="coverage/ai-monitoring-ui/lcov.info"
            echo "Found at: coverage/ai-monitoring-ui/lcov.info"
          else
            # Try to find it recursively
            echo "Searching recursively for lcov.info..."
            COVERAGE_FILE=$(find . -path "*/node_modules" -prune -o -name "lcov.info" -type f -print 2>/dev/null | head -n 1)
            if [ -n "$COVERAGE_FILE" ]; then
              echo "Found at: $COVERAGE_FILE"
            fi
          fi
          
          if [ -n "$COVERAGE_FILE" ] && [ -f "$COVERAGE_FILE" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "coverage_file=$COVERAGE_FILE" >> $GITHUB_OUTPUT
            echo "✓ Coverage file found at $COVERAGE_FILE"
            echo "File size:"
            ls -lh "$COVERAGE_FILE"
            echo "First 20 lines of coverage file:"
            head -n 20 "$COVERAGE_FILE" || echo "File is empty or unreadable"
            echo "Coverage summary (first 10 entries):"
            grep -E "^SF:|^LF:|^LH:" "$COVERAGE_FILE" | head -n 10 || echo "No coverage data found"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✗ Coverage file not found"
            echo "All .info files in coverage directory:"
            find coverage -type f -name "*.info" 2>/dev/null || echo "No .info files found"
            echo "All files in coverage directory:"
            find coverage -type f 2>/dev/null | head -n 20 || echo "No files found"
          fi

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Prepare SonarCloud args
        id: sonar-args
        run: |
          if [ "${{ steps.coverage-check.outputs.exists }}" == "true" ]; then
            COVERAGE_FILE="${{ steps.coverage-check.outputs.coverage_file }}"
            echo "args=-Dsonar.javascript.lcov.reportPaths=$COVERAGE_FILE -Dsonar.typescript.lcov.reportPaths=$COVERAGE_FILE -Dsonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts,**/main.ts,**/app.config.ts,**/app.routes.ts,**/environments/**" >> $GITHUB_OUTPUT
          else
            echo "args=-Dsonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts,**/main.ts,**/app.config.ts,**/app.routes.ts,**/environments/**" >> $GITHUB_OUTPUT
          fi

      - name: Run SonarCloud analysis
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: ${{ steps.sonar-args.outputs.args }}

      - name: Upload coverage to Codecov
        if: steps.coverage-check.outputs.exists == 'true'
        uses: codecov/codecov-action@v4
        with:
          files: ${{ steps.coverage-check.outputs.coverage_file }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unittests
          name: codecov-umbrella
          verbose: true

  # Builds Docker image on develop (with sha) or version tags (with semver)
  # DISABLED: Docker image building temporarily disabled
  docker-build:
    needs: [build-and-test]
    if: always() && (github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push' && (needs.build-and-test.result == 'success' || needs.build-and-test.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
  
      - name: Install dependencies
        run: npm ci
  
      - name: Build
        run: npm run build -- --configuration=production
  
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
  
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
  
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # For develop: develop, sha-xxxxx
            type=ref,event=branch
            type=sha
            # For tags: v1.0.0 -> 1.0.0, 1.0, 1, latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
  
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploys to Kubernetes on main branch push (uses values.yaml tag)
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      # Add your kubectl/kubeconfig setup and helm upgrade here
      # - name: Set up kubeconfig
      #   run: echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig
      
      # - name: Deploy with Helm
      #   run: |
      #     helm upgrade --install ai-monitoring-webui ./charts \
      #       --namespace ai-monitoring \
      #       -f charts/values.yaml

      - name: Deployment placeholder
        run: echo "Deploy to Kubernetes using image tag from values.yaml"

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Lint Helm chart
        run: helm lint charts/
