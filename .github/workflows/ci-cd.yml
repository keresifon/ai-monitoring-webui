name: CI/CD

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Runs on develop and PRs only (NOT on main or tags)
  build-and-test:
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/tags/') && github.ref != 'refs/heads/main'"
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for SonarCloud

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true  # Continue if linting is not configured

      - name: Build
        run: npm run build -- --configuration=production

      - name: Test with coverage
        run: npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage
        continue-on-error: false

      - name: Verify coverage file exists
        id: coverage-check
        run: |
          if [ -f "coverage/lcov.info" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Coverage file found at coverage/lcov.info"
            echo "File size:"
            ls -lh coverage/lcov.info
            echo "First 50 lines of coverage file:"
            head -n 50 coverage/lcov.info || echo "File is empty or unreadable"
            echo "Coverage summary:"
            grep -E "^SF:|^LF:|^LH:" coverage/lcov.info | head -n 10 || echo "No coverage data found"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Coverage file not found. Checking for alternative locations..."
            find . -name "lcov.info" -type f 2>/dev/null || echo "No lcov.info file found"
            echo "Checking coverage directory:"
            ls -la coverage/ 2>/dev/null || echo "Coverage directory does not exist"
          fi

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Run SonarCloud analysis
        if: steps.coverage-check.outputs.exists == 'true'
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.typescript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts,**/main.ts,**/app.config.ts,**/app.routes.ts,**/environments/**

      - name: Upload coverage to Codecov
        if: steps.coverage-check.outputs.exists == 'true'
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unittests
          name: codecov-umbrella
          verbose: true

