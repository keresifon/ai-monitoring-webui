name: CI/CD

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Runs on develop and PRs only (NOT on main or tags)
  build-and-test:
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/tags/') && github.ref != 'refs/heads/main'"
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for SonarCloud

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      # OWASP Dependency-Check for CVE detection (matches log-processor)
      # Fails build on CVSS >= 7. NVD_API_KEY in secrets reduces NVD rate-limiting.
      - name: OWASP Dependency-Check (CVE scan)
        uses: dependency-check/Dependency-Check_Action@main
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        with:
          project: 'ai-monitoring-webui'
          path: '.'
          format: 'HTML'
          out: 'reports'
          args: >
            --failOnCVSS 7
            --enableRetired
            --suppression dependency-check-suppression.xml

      - name: Upload Dependency-Check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/
          retention-days: 30
        continue-on-error: true

      - name: Lint
        run: npm run lint
        continue-on-error: true  # Continue if linting is not configured

      - name: Build
        run: npm run build -- --configuration=production

      - name: Test with coverage
        run: npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage
        continue-on-error: false

      - name: Verify coverage file exists
        id: coverage-check
        run: |
          echo "Searching for coverage file..."
          echo "Checking coverage directory structure:"
          ls -la coverage/ 2>/dev/null || echo "Coverage directory does not exist"
          
          if [ -d "coverage/ai-monitoring-ui" ]; then
            echo "Contents of coverage/ai-monitoring-ui:"
            ls -la coverage/ai-monitoring-ui/ 2>/dev/null || echo "Directory is empty"
            echo "Searching for .info files:"
            find coverage/ai-monitoring-ui -name "*.info" -type f 2>/dev/null || echo "No .info files found"
          fi
          
          # Check for coverage file in common locations
          COVERAGE_FILE=""
          if [ -f "coverage/lcov.info" ]; then
            COVERAGE_FILE="coverage/lcov.info"
            echo "Found at: coverage/lcov.info"
          elif [ -f "coverage/ai-monitoring-ui/lcov.info" ]; then
            COVERAGE_FILE="coverage/ai-monitoring-ui/lcov.info"
            echo "Found at: coverage/ai-monitoring-ui/lcov.info"
          else
            # Try to find it recursively
            echo "Searching recursively for lcov.info..."
            COVERAGE_FILE=$(find . -path "*/node_modules" -prune -o -name "lcov.info" -type f -print 2>/dev/null | head -n 1)
            if [ -n "$COVERAGE_FILE" ]; then
              echo "Found at: $COVERAGE_FILE"
            fi
          fi
          
          if [ -n "$COVERAGE_FILE" ] && [ -f "$COVERAGE_FILE" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "coverage_file=$COVERAGE_FILE" >> $GITHUB_OUTPUT
            echo "✓ Coverage file found at $COVERAGE_FILE"
            echo "File size:"
            ls -lh "$COVERAGE_FILE"
            echo "First 20 lines of coverage file:"
            head -n 20 "$COVERAGE_FILE" || echo "File is empty or unreadable"
            echo "Coverage summary (first 10 entries):"
            grep -E "^SF:|^LF:|^LH:" "$COVERAGE_FILE" | head -n 10 || echo "No coverage data found"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✗ Coverage file not found"
            echo "All .info files in coverage directory:"
            find coverage -type f -name "*.info" 2>/dev/null || echo "No .info files found"
            echo "All files in coverage directory:"
            find coverage -type f 2>/dev/null | head -n 20 || echo "No files found"
          fi

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Prepare SonarCloud args
        id: sonar-args
        run: |
          if [ "${{ steps.coverage-check.outputs.exists }}" == "true" ]; then
            COVERAGE_FILE="${{ steps.coverage-check.outputs.coverage_file }}"
            echo "args=-Dsonar.javascript.lcov.reportPaths=$COVERAGE_FILE -Dsonar.typescript.lcov.reportPaths=$COVERAGE_FILE -Dsonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts,**/main.ts,**/app.config.ts,**/app.routes.ts,**/environments/**" >> $GITHUB_OUTPUT
          else
            echo "args=-Dsonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts,**/main.ts,**/app.config.ts,**/app.routes.ts,**/environments/**" >> $GITHUB_OUTPUT
          fi

      - name: Run SonarCloud analysis
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: ${{ steps.sonar-args.outputs.args }}

      - name: Upload coverage to Codecov
        if: steps.coverage-check.outputs.exists == 'true'
        uses: codecov/codecov-action@v4
        with:
          files: ${{ steps.coverage-check.outputs.coverage_file }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unittests
          name: codecov-umbrella
          verbose: true

  # CodeQL SAST - runs in parallel with build-and-test
  sast-codeql:
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/tags/') && github.ref != 'refs/heads/main'"
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        id: codeql-analysis
        uses: github/codeql-action/analyze@v4

      - name: Upload CodeQL SARIF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif-results
          path: ${{ steps.codeql-analysis.outputs.sarif-output }}
          retention-days: 30

  # Builds Docker image on develop (with sha) or version tags (with semver)
  docker-build:
    needs: [build-and-test]
    if: always() && (github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push' && (needs.build-and-test.result == 'success' || needs.build-and-test.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
  
      - name: Install dependencies
        run: npm ci
  
      - name: Build
        run: npm run build -- --configuration=production
  
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
  
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
  
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # For develop: develop, sha-xxxxx
            type=ref,event=branch
            type=sha
            # For tags: v1.0.0 -> 1.0.0, 1.0, 1, latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
  
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract tag for values.yaml update
        id: extract-tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          # Extract version from tag (v1.2.3 -> 1.2.3)
          TAG_NAME="${{ github.ref_name }}"
          VERSION="${TAG_NAME#v}"  # Remove 'v' prefix if present
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted tag: $VERSION from $TAG_NAME"

      - name: Trigger values.yaml update
        if: startsWith(github.ref, 'refs/tags/v') && steps.extract-tag.outputs.tag != ''
        env:
          # Try PAT first, fallback to GITHUB_TOKEN
          GITHUB_TOKEN: ${{ secrets.REPO_DISPATCH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          # Use GitHub API to trigger repository_dispatch
          # Note: If this fails, create a Personal Access Token (PAT) with 'repo' scope
          # and add it as a secret named 'REPO_DISPATCH_TOKEN'
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token $GITHUB_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{
              "event_type": "image-pushed",
              "client_payload": {
                "tag": "${{ steps.extract-tag.outputs.tag }}",
                "image": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}",
                "ref": "${{ github.ref }}"
              }
            }')
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          if [ "$HTTP_CODE" = "204" ]; then
            echo "✓ Repository dispatch triggered successfully for tag: ${{ steps.extract-tag.outputs.tag }}"
          else
            echo "⚠ Repository dispatch failed with HTTP $HTTP_CODE"
            echo "Response: $BODY"
            echo "Note: The update-image-tag workflow will still trigger via workflow_run after CI/CD completes"
          fi

  # Trivy container image scanning (Phase 1)
  image-scan:
    needs: [docker-build]
    if: always() && (github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push' && needs.docker-build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag for scan
        id: scan-tag
        run: |
          REF="${{ github.ref_name }}"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${REF#v}" >> $GITHUB_OUTPUT
          else
            echo "tag=develop" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.34.0
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.scan-tag.outputs.tag }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          trivyignores: '.trivyignore'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-container'

  # Deploys to AKS on main branch push (uses values.yaml tag)
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28.0'

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Create namespace if not exists
        run: |
          kubectl create namespace ai-monitoring --dry-run=client -o yaml | kubectl apply -f -

      - name: Clear stuck Helm release (if any)
        run: |
          if helm list -n ai-monitoring 2>/dev/null | grep -q ai-monitoring-webui; then
            echo "Clearing any pending Helm operation..."
            helm rollback ai-monitoring-webui -n ai-monitoring 2>/dev/null || true
            sleep 5
          fi

      - name: Deploy with Helm
        run: |
          helm upgrade --install ai-monitoring-webui ./charts \
            --namespace ai-monitoring \
            --create-namespace \
            -f charts/values.yaml

      - name: Verify deployment
        run: |
          echo "Checking deployment status..."
          kubectl rollout status deployment/ai-monitoring-webui-frontend -n ai-monitoring --timeout=2m
          echo ""
          echo "Pods:"
          kubectl get pods -n ai-monitoring -l app.kubernetes.io/instance=ai-monitoring-webui -o wide
          echo ""
          echo "Services:"
          kubectl get svc -n ai-monitoring -l app.kubernetes.io/instance=ai-monitoring-webui

      - name: Debug pod (on failure)
        if: failure()
        run: |
          echo "=== Pod status ==="
          kubectl get pods -n ai-monitoring -l app.kubernetes.io/instance=ai-monitoring-webui -o wide
          echo ""
          echo "=== Pod description ==="
          kubectl describe pods -n ai-monitoring -l app.kubernetes.io/instance=ai-monitoring-webui
          echo ""
          echo "=== Pod logs (if any) ==="
          kubectl logs -n ai-monitoring -l app.kubernetes.io/instance=ai-monitoring-webui --tail=100 --all-containers=true 2>/dev/null || true

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Lint Helm chart
        run: helm lint charts/
